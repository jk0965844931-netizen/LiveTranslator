name: LiveTranslator
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: 16.0
configurations:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
targets:
  LiveTranslator:
    type: application
    platform: iOS
    deploymentTarget: 16.0
    bundleId: com.yourname.LiveTranslator
    info:
      path: AppSources/Info.plist
    sources:
      - AppSources
    dependencies:
      - target: BroadcastExt
        embed: true
  BroadcastExt:
    type: app-extension
    platform: iOS
    deploymentTarget: 16.0
    bundleId: com.yourname.LiveTranslator.BroadcastExt
    info:
      path: ExtSources/Info.plist
    sources:
      - ExtSources
