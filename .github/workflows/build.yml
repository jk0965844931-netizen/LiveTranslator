name: Build Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App (Unsigned)
        run: |
          xcodebuild clean build \
            -project "LiveTranslator.xcodeproj" \
            -scheme "LiveTranslator" \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/LiveTranslator.app Payload/
          zip -qr LiveTranslator.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v3
        with:
          name: LiveTranslator-Unsigned-IPA
          path: LiveTranslator.ipa
